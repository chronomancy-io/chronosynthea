---
name: CI/CD Pipeline

'on':
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -W clippy::all

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace

      - name: Run tests (release mode)
        run: cargo test --workspace --release

  validation:
    name: Java Synthea Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-validate-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-validate-

      - name: Run validation tests
        run: |
          cargo test --package chronosynthea-mss --test java_validation --release -- --nocapture 2>&1 | tee validation_results.txt

      - name: Check max deviation < 1%
        run: |
          if grep -q "Max Deviation:" validation_results.txt; then
            DEVIATION=$(grep "Max Deviation:" validation_results.txt | grep -oP '\d+\.\d+' | head -1)
            echo "Max Deviation: $DEVIATION%"
            if (( $(echo "$DEVIATION < 1.0" | bc -l) )); then
              echo "::notice::Statistical validation PASSED: $DEVIATION% max deviation (< 1% target)"
            else
              echo "::error::Statistical validation FAILED: $DEVIATION% max deviation (> 1% target)"
              exit 1
            fi
          fi

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: validation_results.txt
          retention-days: 30

  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Run performance tests
        run: |
          cargo test --package chronosynthea-mss --test java_validation --release -- test_full_generation_performance --nocapture 2>&1 | tee benchmark_results.txt

      - name: Check 1M patients/second threshold
        run: |
          if grep -q "Projected time for 1M patients:" benchmark_results.txt; then
            TIME_MS=$(grep "Projected time for 1M patients:" benchmark_results.txt | grep -oP '\d+\.\d+' | head -1)
            echo "Time for 1M patients: ${TIME_MS}ms"
            # Check if < 1000ms (1 second)
            if (( $(echo "$TIME_MS < 1000" | bc -l) )); then
              echo "::notice::Performance target MET: ${TIME_MS}ms for 1M patients (< 1 second target)"
            else
              echo "::warning::Performance target MISSED: ${TIME_MS}ms for 1M patients (> 1 second target)"
            fi
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.txt
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        continue-on-error: true  # Cross-compilation may fail without proper setup

  verify-docs:
    name: Documentation Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required documentation
        run: |
          MISSING=0
          REQUIRED_FILES=(
            README.md
            ARCHITECTURE.md
            PERFORMANCE.md
            STRATEGY.md
            CONTRIBUTING.md
            LICENSE
          )
          for file in "${REQUIRED_FILES[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error::Missing required file: $file"
              MISSING=$((MISSING + 1))
            else
              echo "::notice::Found: $file"
            fi
          done
          if [[ $MISSING -gt 0 ]]; then
            exit 1
          fi

      - name: Check Cargo.toml exists
        run: |
          if [[ ! -f "Cargo.toml" ]]; then
            echo "::error::Missing Cargo.toml"
            exit 1
          fi
          echo "::notice::Cargo.toml found"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - validation
      - build
      - verify-docs
    if: always()
    steps:
      - name: Check job statuses
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          VALIDATION_RESULT: ${{ needs.validation.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DOCS_RESULT: ${{ needs.verify-docs.result }}
        run: |
          echo "=== CI Summary ==="
          echo "Lint:       ${LINT_RESULT}"
          echo "Test:       ${TEST_RESULT}"
          echo "Validation: ${VALIDATION_RESULT}"
          echo "Build:      ${BUILD_RESULT}"
          echo "Docs:       ${DOCS_RESULT}"
          
          if [[ "${LINT_RESULT}" != "success" ]]; then
            echo "::error::Lint failed"
            exit 1
          fi
          if [[ "${TEST_RESULT}" != "success" ]]; then
            echo "::error::Tests failed"
            exit 1
          fi
          if [[ "${VALIDATION_RESULT}" != "success" ]]; then
            echo "::error::Validation failed"
            exit 1
          fi
          if [[ "${BUILD_RESULT}" != "success" ]]; then
            echo "::warning::Build had issues (cross-compilation may have failed)"
          fi
          if [[ "${DOCS_RESULT}" != "success" ]]; then
            echo "::error::Documentation verification failed"
            exit 1
          fi
          echo "::notice::All critical checks passed"
